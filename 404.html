<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages serves this on unknown paths; save the path and redirect to index.html
    const path = window.location.pathname.replace(/\/$/, '') || '/';
    sessionStorage.setItem('redirect', path);
    window.location.href = '/';
  </script>
  <title>Redirecting...</title>
</head>
<body>
  Redirecting...
</body>
</html>
